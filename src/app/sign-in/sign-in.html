<div class="relative min-h-screen bg-background-dark text-white flex items-center justify-center px-4 py-12 pt-32">
  <!-- Background Grid -->
  <div class="absolute inset-0 opacity-5 pointer-events-none" style="background-image: radial-gradient(circle at 1px 1px, rgba(59, 130, 246, 0.5) 1px, transparent 1px); background-size: 50px 50px;"></div>
  
  <!-- Floating Elements -->
  <div class="absolute top-10 left-10 w-32 h-32 bg-blue-600/5 rounded-full blur-3xl opacity-20 pointer-events-none"></div>
  <div class="absolute bottom-10 right-10 w-40 h-40 bg-blue-600/5 rounded-full blur-3xl opacity-20 pointer-events-none"></div>

  <div class="relative z-10 w-full max-w-md">
    <!-- Logo & Header -->
    <div class="text-center mb-12">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gradient-to-br from-blue-600 to-blue-500 mb-6 shadow-lg shadow-blue-500/30">
        <span class="material-symbols-outlined text-4xl text-white">login</span>
      </div>
      <h1 class="text-3xl md:text-4xl font-black text-white mb-3">Welcome Back</h1>
      <p class="text-white/60">Sign in to your Hamatoz account</p>
    </div>

    <!-- Social Login -->
    <div class="space-y-3 mb-8">
      <button class="w-full flex items-center justify-center gap-3 bg-white/5 hover:bg-white/10 border border-white/10 hover:border-blue-400/50 text-white py-3 rounded-lg transition-all hover:-translate-y-0.5 active:translate-y-0">
        <span class="material-symbols-outlined text-xl">
          <!-- Google Icon -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="w-5 h-5 fill-current" style="display: inline;">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
        </span>
        <span class="text-sm font-bold">Sign in with Google</span>
      </button>
    </div>

    <!-- Divider -->
    <div class="flex items-center gap-4 mb-8">
      <div class="flex-1 h-px bg-gradient-to-r from-transparent to-white/20"></div>
      <span class="text-xs text-white/50 font-bold uppercase">Or</span>
      <div class="flex-1 h-px bg-gradient-to-l from-transparent to-white/20"></div>
    </div>

    <!-- Sign In Form -->
    <form (ngSubmit)="onSignIn()" class="space-y-4 mb-8">
      <!-- Email Input -->
      <div class="relative">
        <input
          [(ngModel)]="formData.email"
          name="email"
          type="email"
          placeholder="Email Address"
          class="w-full bg-white/5 border border-blue-500/20 rounded-lg px-4 py-3 text-white placeholder:text-white/40 focus:border-blue-400 focus:bg-white/10 focus:ring-1 focus:ring-blue-500/20 transition-all outline-none"
        />
      </div>

      <!-- Password Input -->
      <div class="relative">
        <input
          [(ngModel)]="formData.password"
          name="password"
          [type]="showPassword ? 'text' : 'password'"
          placeholder="Password"
          class="w-full bg-white/5 border border-blue-500/20 rounded-lg px-4 py-3 pr-12 text-white placeholder:text-white/40 focus:border-blue-400 focus:bg-white/10 focus:ring-1 focus:ring-blue-500/20 transition-all outline-none"
        />
        <button
          type="button"
          (click)="togglePasswordVisibility()"
          class="absolute left-4 top-3.5 text-white/50 hover:text-blue-400 transition-colors"
        >
          <span class="material-symbols-outlined text-lg">{{ showPassword ? 'visibility' : 'visibility_off' }}</span>
        </button>
      </div>

      <!-- Remember & Forgot Password -->
      <div class="flex items-center justify-between">
        <label class="flex items-center gap-2 cursor-pointer">
          <input
            [(ngModel)]="formData.rememberMe"
            name="rememberMe"
            type="checkbox"
            class="w-4 h-4 rounded accent-blue-600 cursor-pointer"
          />
          <span class="text-xs text-white/70 font-medium">Remember me</span>
        </label>
        <a href="#" class="text-xs text-blue-400 hover:text-blue-300 transition-colors font-medium">Forgot Password?</a>
      </div>

      <!-- Sign In Button -->
      <button
        type="submit"
        class="w-full bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white font-bold py-3 rounded-lg transition-all shadow-lg shadow-blue-500/25 hover:shadow-blue-500/40 hover:-translate-y-0.5 active:translate-y-0 mt-6"
      >
        Sign In
      </button>
    </form>

    <!-- Sign Up Link -->
    <div class="text-center mb-8">
      <p class="text-white/60 text-sm">
        Don't have an account?
        <a routerLink="/sign-up" class="text-blue-400 hover:text-blue-300 font-bold transition-colors">Create one</a>
      </p>
    </div>

    <!-- Footer Info -->
    <div class="p-4 bg-blue-600/10 border border-blue-500/20 rounded-lg">
      <p class="text-xs text-white/60 text-center flex items-center justify-center gap-2">
        <span class="material-symbols-outlined text-base">lock</span>
        Your data is secure and encrypted
      </p>
    </div>
  </div>
</div>
