<div class="relative min-h-screen bg-background-dark text-white flex items-center justify-center px-4 py-12 pt-32">
  <div class="absolute inset-0 opacity-5 pointer-events-none" style="background-image: radial-gradient(circle at 1px 1px, rgba(59, 130, 246, 0.5) 1px, transparent 1px); background-size: 50px 50px;"></div>

  <div class="relative z-10 w-full max-w-md">
    <div class="text-center mb-12">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gradient-to-br from-blue-600 to-blue-500 mb-6 shadow-lg shadow-blue-500/30">
        <span class="material-symbols-outlined text-4xl text-white">admin_panel_settings</span>
      </div>
      <h1 class="text-3xl md:text-4xl font-black text-white mb-3">Admin Sign In</h1>
      <p class="text-white/60">Use your real Hamatoz admin account</p>
    </div>

    <div *ngIf="errorMessage" class="p-4 mb-6 rounded-lg bg-red-500/15 border border-red-500/30 text-red-300 text-sm flex items-center gap-3">
      <span class="material-symbols-outlined text-lg">warning</span>
      {{ errorMessage }}
    </div>

    <div *ngIf="successMessage" class="p-4 mb-6 rounded-lg bg-green-500/15 border border-green-500/30 text-green-300 text-sm flex items-center gap-3">
      <span class="material-symbols-outlined text-lg">check_circle</span>
      {{ successMessage }}
    </div>

    <form (ngSubmit)="onSignIn()" class="space-y-4 mb-8">
      <div class="relative">
        <input
          [(ngModel)]="email"
          name="email"
          type="email"
          placeholder="Email Address"
          autocomplete="email"
          class="w-full bg-white/5 border border-blue-500/20 rounded-lg px-4 py-3 text-white placeholder:text-white/40 focus:border-blue-400 focus:bg-white/10 focus:ring-1 focus:ring-blue-500/20 transition-all outline-none"
        />
      </div>

      <div class="relative">
        <input
          [(ngModel)]="password"
          name="password"
          [type]="showPassword ? 'text' : 'password'"
          placeholder="Password"
          autocomplete="current-password"
          class="w-full bg-white/5 border border-blue-500/20 rounded-lg px-4 py-3 pr-12 text-white placeholder:text-white/40 focus:border-blue-400 focus:bg-white/10 focus:ring-1 focus:ring-blue-500/20 transition-all outline-none"
        />
        <button
          type="button"
          (click)="togglePasswordVisibility()"
          class="absolute right-4 top-3.5 text-white/50 hover:text-blue-400 transition-colors"
          aria-label="Toggle password visibility"
        >
          <span class="material-symbols-outlined text-lg">{{ showPassword ? 'visibility' : 'visibility_off' }}</span>
        </button>
      </div>

      <label class="flex items-center gap-2 cursor-pointer">
        <input
          [(ngModel)]="rememberMe"
          name="rememberMe"
          type="checkbox"
          class="w-4 h-4 rounded accent-blue-600 cursor-pointer"
        />
        <span class="text-xs text-white/70 font-medium">Remember me</span>
      </label>

      <button
        type="submit"
        [disabled]="isLoading"
        class="w-full bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white font-bold py-3 rounded-lg transition-all shadow-lg shadow-blue-500/25 hover:shadow-blue-500/40 hover:-translate-y-0.5 active:translate-y-0 mt-6 disabled:opacity-50 disabled:cursor-not-allowed"
      >
        {{ isLoading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <div class="text-center">
      <a routerLink="/sign-in" class="text-blue-400 hover:text-blue-300 text-sm font-bold transition-colors">
        Customer or agency login
      </a>
    </div>
  </div>
</div>
