<div class="relative flex min-h-screen items-center justify-center bg-background-dark px-4 py-12 pt-32 text-white">
  <div class="absolute inset-0 opacity-5 pointer-events-none" style="background-image: radial-gradient(circle at 1px 1px, rgba(59, 130, 246, 0.5) 1px, transparent 1px); background-size: 50px 50px;"></div>

  <div class="relative z-10 w-full max-w-md">
    <div class="mb-10 text-center">
      <div class="mb-6 inline-flex h-16 w-16 items-center justify-center rounded-full bg-gradient-to-br from-blue-600 to-blue-500 shadow-lg shadow-blue-500/30">
        <span class="material-symbols-outlined text-4xl text-white">login</span>
      </div>
      <h1 class="mb-3 text-3xl font-black text-white md:text-4xl">Welcome Back</h1>
      <p class="text-white/60">Sign in to continue to Hamatoz</p>
    </div>

    <div *ngIf="errorMessage" class="mb-6 flex items-center gap-3 rounded-lg border border-red-500/30 bg-red-500/15 p-4 text-sm text-red-300">
      <span class="material-symbols-outlined text-lg">warning</span>
      {{ errorMessage }}
    </div>

    <div *ngIf="successMessage" class="mb-6 flex items-center gap-3 rounded-lg border border-green-500/30 bg-green-500/15 p-4 text-sm text-green-300">
      <span class="material-symbols-outlined text-lg">check_circle</span>
      {{ successMessage }}
    </div>

    <form (ngSubmit)="onSignIn()" class="mb-8 space-y-4">
      <input
        [(ngModel)]="formData.email"
        name="email"
        type="email"
        autocomplete="email"
        placeholder="Email Address"
        class="w-full rounded-lg border border-blue-500/20 bg-white/5 px-4 py-3 text-white outline-none transition-all placeholder:text-white/40 focus:border-blue-400 focus:bg-white/10 focus:ring-1 focus:ring-blue-500/20"
      />

      <div class="relative">
        <input
          [(ngModel)]="formData.password"
          name="password"
          [type]="showPassword ? 'text' : 'password'"
          autocomplete="current-password"
          placeholder="Password"
          class="w-full rounded-lg border border-blue-500/20 bg-white/5 px-4 py-3 pr-12 text-white outline-none transition-all placeholder:text-white/40 focus:border-blue-400 focus:bg-white/10 focus:ring-1 focus:ring-blue-500/20"
        />
        <button
          type="button"
          (click)="togglePasswordVisibility()"
          class="absolute right-4 top-3.5 text-white/50 transition-colors hover:text-blue-400"
          aria-label="Toggle password visibility"
        >
          <span class="material-symbols-outlined text-lg">{{ showPassword ? 'visibility' : 'visibility_off' }}</span>
        </button>
      </div>

      <label class="flex cursor-pointer items-center gap-2">
        <input
          [(ngModel)]="formData.rememberMe"
          name="rememberMe"
          type="checkbox"
          class="h-4 w-4 cursor-pointer rounded accent-blue-600"
        />
        <span class="text-xs font-medium text-white/70">Remember me</span>
      </label>

      <button
        type="submit"
        [disabled]="isLoading"
        class="mt-6 w-full rounded-lg bg-gradient-to-r from-blue-600 to-blue-500 py-3 font-bold text-white shadow-lg shadow-blue-500/25 transition-all hover:-translate-y-0.5 hover:from-blue-500 hover:to-blue-400 hover:shadow-blue-500/40 active:translate-y-0 disabled:cursor-not-allowed disabled:opacity-50"
      >
        {{ isLoading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <div class="mb-8 text-center">
      <p class="text-sm text-white/60">
        Don't have an account?
        <a routerLink="/sign-up" class="font-bold text-blue-400 transition-colors hover:text-blue-300">Create one</a>
      </p>
    </div>

    <div class="rounded-lg border border-blue-500/20 bg-blue-600/10 p-4">
      <p class="flex items-center justify-center gap-2 text-center text-xs text-white/60">
        <span class="material-symbols-outlined text-base">lock</span>
        Protected session
      </p>
    </div>
  </div>
</div>
