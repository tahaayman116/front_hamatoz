<div class="relative min-h-screen bg-background-dark text-white flex items-center justify-center px-4 py-12 pt-32">
  <!-- Background Grid -->
  <div class="absolute inset-0 opacity-5 pointer-events-none" style="background-image: radial-gradient(circle at 1px 1px, rgba(59, 130, 246, 0.5) 1px, transparent 1px); background-size: 50px 50px;"></div>

  <div class="relative z-10 w-full max-w-4xl">
    <!-- Header -->
    <div class="text-center mb-12">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gradient-to-br from-blue-600 to-blue-500 mb-6 shadow-lg shadow-blue-500/30">
        <span class="material-symbols-outlined text-4xl text-white">tune</span>
      </div>
      <h1 class="text-4xl font-black text-white mb-3">Customize Your Experience</h1>
      <p class="text-white/60 max-w-2xl mx-auto">Let us know what you're interested in. You can always change this later.</p>
    </div>

    <!-- Progress Bar -->
    <div class="mb-12">
      <div class="flex items-center justify-between mb-3">
        <p class="text-xs font-bold text-white/70 uppercase tracking-wider">Step {{ currentStep }} of {{ totalSteps }}</p>
        <p class="text-xs font-bold text-blue-400">{{ getProgressPercentage() | number: '1.0-0' }}%</p>
      </div>
      <div class="w-full h-1.5 bg-white/10 rounded-full overflow-hidden">
        <div 
          class="h-full bg-gradient-to-r from-blue-600 to-blue-500 transition-all duration-300 shadow-lg shadow-blue-500/50"
          [style.width.%]="getProgressPercentage()"
        ></div>
      </div>
    </div>

    <!-- Step Title & Description -->
    <div class="text-center mb-12">
      <h2 class="text-3xl font-black text-white mb-3">{{ getStepTitle() }}</h2>
      <p class="text-white/60">{{ getStepDescription() }}</p>
    </div>

    <!-- Content based on Step -->
    <div class="min-h-96 mb-12">
      <!-- Step 1: Car Models -->
      <div *ngIf="currentStep === 1" class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <button
          *ngFor="let model of models"
          type="button"
          (click)="toggleSelection(model.id, 'model')"
          class="p-6 rounded-xl border-2 transition-all cursor-pointer flex flex-col items-center gap-3"
          [ngClass]="{
            'border-blue-500 bg-blue-600/15 shadow-lg shadow-blue-500/20': isSelected(model.id, 'model'),
            'border-white/10 bg-white/5 hover:border-blue-400/50': !isSelected(model.id, 'model')
          }"
        >
          <span class="material-symbols-outlined text-4xl" [ngClass]="isSelected(model.id, 'model') ? 'text-blue-400' : 'text-white/50'">{{ model.icon }}</span>
          <p class="text-sm font-bold text-center">{{ model.name }}</p>
          <span *ngIf="isSelected(model.id, 'model')" class="material-symbols-outlined text-blue-400 text-lg">check_circle</span>
        </button>
      </div>

      <!-- Step 2: Brands -->
      <div *ngIf="currentStep === 2" class="grid grid-cols-2 md:grid-cols-5 gap-4">
        <button
          *ngFor="let brand of brands"
          type="button"
          (click)="toggleSelection(brand.id, 'brand')"
          class="p-6 rounded-xl border-2 transition-all cursor-pointer flex flex-col items-center gap-4 group"
          [ngClass]="{
            'border-blue-500 bg-blue-600/15 shadow-lg shadow-blue-500/20': isSelected(brand.id, 'brand'),
            'border-white/10 bg-white/5 hover:border-blue-400/50': !isSelected(brand.id, 'brand')
          }"
        >
          <!-- Logo Circle -->
          <div 
            class="w-16 h-16 rounded-full flex items-center justify-center font-bold text-2xl transition-all"
            [style.backgroundColor]="brand.color + '20'"
            [style.color]="brand.color"
            [ngClass]="isSelected(brand.id, 'brand') ? 'scale-110 ring-2 ring-offset-2 ring-offset-background-dark' : 'group-hover:scale-105'"
            [style.ringColor]="brand.color"
          >
            {{ brand.logo }}
          </div>
          
          <!-- Brand Name -->
          <p class="text-sm font-bold text-white text-center">{{ brand.name }}</p>
          
          <!-- Check Icon -->
          <span *ngIf="isSelected(brand.id, 'brand')" class="material-symbols-outlined text-blue-400 text-lg absolute top-2 right-2">check_circle</span>
        </button>
      </div>

      <!-- Step 3: Driving Styles -->
      <div *ngIf="currentStep === 3" class="grid grid-cols-2 md:grid-cols-3 gap-4">
        <button
          *ngFor="let style of drivingStyles"
          type="button"
          (click)="toggleSelection(style.id, 'style')"
          class="p-6 rounded-xl border-2 transition-all cursor-pointer flex flex-col items-center gap-3"
          [ngClass]="{
            'border-blue-500 bg-blue-600/15 shadow-lg shadow-blue-500/20': isSelected(style.id, 'style'),
            'border-white/10 bg-white/5 hover:border-blue-400/50': !isSelected(style.id, 'style')
          }"
        >
          <span class="material-symbols-outlined text-4xl" [ngClass]="isSelected(style.id, 'style') ? 'text-blue-400' : 'text-white/50'">{{ style.icon }}</span>
          <p class="text-sm font-bold text-center">{{ style.name }}</p>
          <span *ngIf="isSelected(style.id, 'style')" class="material-symbols-outlined text-blue-400 text-lg">check_circle</span>
        </button>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="flex items-center justify-between gap-4">
      <button
        (click)="skip()"
        class="px-8 py-3 bg-white/5 hover:bg-white/10 border border-white/10 hover:border-white/20 text-white rounded-lg font-bold transition-all"
      >
        Skip for Now
      </button>

      <div class="flex gap-4">
        <button
          *ngIf="currentStep > 1"
          (click)="previousStep()"
          class="px-8 py-3 bg-white/5 hover:bg-white/10 border border-white/10 hover:border-white/20 text-white rounded-lg font-bold transition-all flex items-center gap-2"
        >
          <span class="material-symbols-outlined">arrow_back</span>
          Back
        </button>

        <button
          (click)="nextStep()"
          class="px-8 py-3 bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white rounded-lg font-bold transition-all shadow-lg shadow-blue-500/25 hover:shadow-blue-500/40 flex items-center gap-2"
        >
          <span>{{ currentStep === totalSteps ? 'Complete' : 'Next' }}</span>
          <span class="material-symbols-outlined">{{ currentStep === totalSteps ? 'check' : 'arrow_forward' }}</span>
        </button>
      </div>
    </div>
  </div>
</div>
