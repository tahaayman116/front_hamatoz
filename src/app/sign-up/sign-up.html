<div class="relative min-h-screen bg-background-dark text-white flex items-center justify-center px-4 py-12 pt-32">
  <!-- Background Grid -->
  <div class="absolute inset-0 opacity-5 pointer-events-none" style="background-image: radial-gradient(circle at 1px 1px, rgba(59, 130, 246, 0.5) 1px, transparent 1px); background-size: 50px 50px;"></div>
  
  <div class="relative z-10 w-full max-w-md">
    <!-- Logo & Header -->
    <div class="text-center mb-12">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gradient-to-br from-blue-600 to-blue-500 mb-6 shadow-lg shadow-blue-500/30">
        <span class="material-symbols-outlined text-4xl text-white">person_add</span>
      </div>
      <h1 class="text-3xl md:text-4xl font-black text-white mb-3">Create Account</h1>
      <p class="text-white/60">Join Hamatoz today and discover amazing vehicles</p>
    </div>

    <!-- Error Message -->
    <div *ngIf="errorMessage" class="p-4 mb-6 rounded-lg bg-red-500/15 border border-red-500/30 text-red-300 text-sm flex items-center gap-3">
      <span class="material-symbols-outlined text-base">error</span>
      {{ errorMessage }}
    </div>

    <!-- Success Message -->
    <div *ngIf="successMessage" class="p-4 mb-6 rounded-lg bg-green-500/15 border border-green-500/30 text-green-300 text-sm flex items-center gap-3">
      <span class="material-symbols-outlined text-base">check_circle</span>
      {{ successMessage }}
    </div>

    <!-- User Type Selection -->
    <div class="mb-8 space-y-3">
      <p class="text-xs font-bold text-white/70 uppercase tracking-wider px-1">Account Type</p>
      <div class="grid grid-cols-2 gap-4">
        <!-- User Type -->
        <button
          type="button"
          (click)="userType = 'Customer'"
          class="p-4 rounded-xl border-2 transition-all cursor-pointer flex flex-col items-center gap-3"
          [ngClass]="{
            'border-blue-500 bg-blue-600/15': userType === 'Customer',
            'border-white/10 bg-white/5 hover:border-blue-400/50': userType !== 'Customer'
          }"
        >
          <span class="material-symbols-outlined text-3xl" [ngClass]="userType === 'Customer' ? 'text-blue-400' : 'text-white/50'">person</span>
          <span class="text-xs font-bold">Individual</span>
        </button>

        <!-- Agency Type -->
        <button
          type="button"
          (click)="userType = 'Agency'"
          class="p-4 rounded-xl border-2 transition-all cursor-pointer flex flex-col items-center gap-3"
          [ngClass]="{
            'border-blue-500 bg-blue-600/15': userType === 'Agency',
            'border-white/10 bg-white/5 hover:border-blue-400/50': userType !== 'Agency'
          }"
        >
          <span class="material-symbols-outlined text-3xl" [ngClass]="userType === 'Agency' ? 'text-blue-400' : 'text-white/50'">domain</span>
          <span class="text-xs font-bold">Agency</span>
        </button>
      </div>
    </div>

    <!-- Sign Up Form -->
    <form (ngSubmit)="onSignUp()" class="space-y-4 mb-8">
      <!-- Full Name Input -->
      <div class="relative">
        <input
          [(ngModel)]="formData.fullName"
          name="fullName"
          type="text"
          placeholder="Full Name"
          class="w-full bg-white/5 border border-blue-500/20 rounded-lg px-4 py-3 text-white placeholder:text-white/40 focus:border-blue-400 focus:bg-white/10 focus:ring-1 focus:ring-blue-500/20 transition-all outline-none"
        />
      </div>

      <!-- Phone Input -->
      <div class="relative">
        <input
          [(ngModel)]="formData.phone"
          name="phone"
          type="tel"
          placeholder="Phone Number"
          class="w-full bg-white/5 border border-blue-500/20 rounded-lg px-4 py-3 text-white placeholder:text-white/40 focus:border-blue-400 focus:bg-white/10 focus:ring-1 focus:ring-blue-500/20 transition-all outline-none"
        />
      </div>

      <!-- Email Input -->
      <div class="relative">
        <input
          [(ngModel)]="formData.email"
          name="email"
          type="email"
          placeholder="Email Address"
          class="w-full bg-white/5 border border-blue-500/20 rounded-lg px-4 py-3 text-white placeholder:text-white/40 focus:border-blue-400 focus:bg-white/10 focus:ring-1 focus:ring-blue-500/20 transition-all outline-none"
        />
      </div>

      <!-- National ID Input -->
      <div class="relative">
        <input
          [(ngModel)]="formData.nationalId"
          name="nationalId"
          type="text"
          placeholder="National ID (14 digits)"
          maxlength="14"
          class="w-full bg-white/5 border border-blue-500/20 rounded-lg px-4 py-3 text-white placeholder:text-white/40 focus:border-blue-400 focus:bg-white/10 focus:ring-1 focus:ring-blue-500/20 transition-all outline-none"
        />
      </div>

      <!-- Password Input -->
      <div class="relative">
        <input
          [(ngModel)]="formData.password"
          name="password"
          type="password"
          placeholder="Password (min 6 characters)"
          class="w-full bg-white/5 border border-blue-500/20 rounded-lg px-4 py-3 text-white placeholder:text-white/40 focus:border-blue-400 focus:bg-white/10 focus:ring-1 focus:ring-blue-500/20 transition-all outline-none"
        />
      </div>

      <!-- Confirm Password Input -->
      <div class="relative">
        <input
          [(ngModel)]="formData.confirmPassword"
          name="confirmPassword"
          type="password"
          placeholder="Confirm Password"
          class="w-full bg-white/5 border border-blue-500/20 rounded-lg px-4 py-3 text-white placeholder:text-white/40 focus:border-blue-400 focus:bg-white/10 focus:ring-1 focus:ring-blue-500/20 transition-all outline-none"
        />
      </div>

      <!-- Agree Checkbox -->
      <label class="flex items-start gap-3 p-4 rounded-lg bg-white/5 border border-blue-500/10 cursor-pointer hover:bg-white/8 hover:border-blue-500/20 transition-all">
        <input
          [(ngModel)]="formData.agree"
          name="agree"
          type="checkbox"
          class="w-5 h-5 rounded mt-0.5 accent-blue-600 cursor-pointer"
        />
        <span class="text-xs text-white/70 leading-relaxed">
          I agree to the
          <a routerLink="/terms" target="_blank" rel="noopener" (click)="$event.stopPropagation()" class="text-blue-400 hover:text-blue-300 font-semibold">Terms of Service</a>
          and
          <a routerLink="/privacy" target="_blank" rel="noopener" (click)="$event.stopPropagation()" class="text-blue-400 hover:text-blue-300 font-semibold">Privacy Policy</a>
        </span>
      </label>

      <!-- Sign Up Button -->
      <button
        type="submit"
        [disabled]="isLoading"
        class="w-full bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white font-bold py-3 rounded-lg transition-all shadow-lg shadow-blue-500/25 hover:shadow-blue-500/40 hover:-translate-y-0.5 active:translate-y-0 disabled:opacity-50 disabled:cursor-not-allowed"
      >
        {{ isLoading ? '⏳ Creating Account...' : 'Create Account' }}
      </button>
    </form>

    <!-- Sign In Link -->
    <div class="text-center">
      <p class="text-white/60 text-sm">
        Already have an account?
        <a routerLink="/sign-in" class="text-blue-400 hover:text-blue-300 font-bold transition-colors">Sign In</a>
      </p>
    </div>
  </div>
</div>
